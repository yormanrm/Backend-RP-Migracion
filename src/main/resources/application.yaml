spring:
  application:
    name: marketplace
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=marketplace-db;encrypt=true;trustServerCertificate=true;
    username: sa
    password: ${DB_PASSWORD:localhost9797}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect

app:
  jwt:
    # HS256 exige clave >= 32 bytes; mover a variable de entorno antes de producción.
    secret: "marketplace-dev-secret-key-2026-change-before-production-32b-min"
    expiration-minutes: 120

logging:
  file:
    name: logs/app.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    com.migracion.marketplace: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE # Esto muestra los valores de los parámetros (?)
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE